version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  PRODUÇÃO — imagens pré-construídas no GHCR por cada repo independente
#
#  Cada serviço tem o seu próprio repositório e pipeline CI/CD.
#  Este ficheiro é gerido pelo repo ebooks-infra.
#
#  Usar:  docker compose -f docker-compose.prod.yml up -d
#  Owner: substituir "owner" pelo GitHub username/org
# ─────────────────────────────────────────────────────────────────────────────

x-ghcr: &ghcr ghcr.io/${GHCR_OWNER:?Set GHCR_OWNER in .env}

services:

  # ─── INFRAESTRUTURA ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ebooks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ebooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [ebooks-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ebooks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ebooks-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ebooks}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [ebooks-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ebooks-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks: [ebooks-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: ebooks-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks: [ebooks-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 20s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ebooks-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?required}
    volumes:
      - minio_data:/data
    networks: [ebooks-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: ebooks-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/ebooks.co.mz:/etc/nginx/certs:ro
    depends_on: [ebooks-web, ebooks-api-gateway]
    networks: [ebooks-net]

  # ─── SPRING BOOT SERVICES ───────────────────────────────────────────────────

  ebooks-api-gateway:
    image: *ghcr/ebooks-api-gateway:${GATEWAY_TAG:-latest}
    container_name: ebooks-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://ebooks-auth-service:8081
      CATALOG_SERVICE_URL: http://ebooks-catalog-service:8082
      COMMERCE_SERVICE_URL: http://ebooks-commerce-service:8083
      READING_SERVICE_URL: http://ebooks-reading-service:3001
      NOTIFICATION_SERVICE_URL: http://ebooks-notification-service:3002
      SOCIAL_SERVICE_URL: http://ebooks-social-service:3003
      MEDIA_SERVICE_URL: http://ebooks-media-service:3004
      PARTNER_SERVICE_URL: http://ebooks-partner-service:3005
      DELIVERY_SERVICE_URL: http://ebooks-delivery-service:3006
      ANALYTICS_SERVICE_URL: http://ebooks-analytics-service:3007
      REDIS_URL: redis://ebooks-redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-auth-service:
    image: *ghcr/ebooks-auth-service:${AUTH_TAG:-latest}
    container_name: ebooks-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://ebooks-postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ebooks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: ebooks-rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-ebooks}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_DATA_REDIS_URL: redis://ebooks-redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-catalog-service:
    image: *ghcr/ebooks-catalog-service:${CATALOG_TAG:-latest}
    container_name: ebooks-catalog-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://ebooks-postgres:5432/catalog_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ebooks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: ebooks-rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-ebooks}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_ELASTICSEARCH_URIS: http://ebooks-elasticsearch:9200
      MINIO_ENDPOINT: http://ebooks-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-commerce-service:
    image: *ghcr/ebooks-commerce-service:${COMMERCE_TAG:-latest}
    container_name: ebooks-commerce-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file: .env
    environment:
      PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://ebooks-postgres:5432/commerce_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ebooks}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: ebooks-rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-ebooks}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_DATA_REDIS_URL: redis://ebooks-redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ebooks-net]

  # ─── NESTJS SERVICES ────────────────────────────────────────────────────────

  ebooks-reading-service:
    image: *ghcr/ebooks-reading-service:${READING_TAG:-latest}
    container_name: ebooks-reading-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-ebooks}:${POSTGRES_PASSWORD}@ebooks-postgres:5432/reading_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ebooks}:${RABBITMQ_PASSWORD}@ebooks-rabbitmq:5672
      REDIS_URL: redis://ebooks-redis:6379
      MINIO_ENDPOINT: http://ebooks-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ebooks-files
      CATALOG_SERVICE_URL: http://ebooks-catalog-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-notification-service:
    image: *ghcr/ebooks-notification-service:${NOTIFICATION_TAG:-latest}
    container_name: ebooks-notification-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-ebooks}:${POSTGRES_PASSWORD}@ebooks-postgres:5432/notification_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ebooks}:${RABBITMQ_PASSWORD}@ebooks-rabbitmq:5672
      AUTH_SERVICE_URL: http://ebooks-auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-social-service:
    image: *ghcr/ebooks-social-service:${SOCIAL_TAG:-latest}
    container_name: ebooks-social-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-ebooks}:${POSTGRES_PASSWORD}@ebooks-postgres:5432/social_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ebooks}:${RABBITMQ_PASSWORD}@ebooks-rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-media-service:
    image: *ghcr/ebooks-media-service:${MEDIA_TAG:-latest}
    container_name: ebooks-media-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file: .env
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-ebooks}:${POSTGRES_PASSWORD}@ebooks-postgres:5432/media_db
      MINIO_ENDPOINT: http://ebooks-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      minio:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-partner-service:
    image: *ghcr/ebooks-partner-service:${PARTNER_TAG:-latest}
    container_name: ebooks-partner-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file: .env
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-ebooks}:${POSTGRES_PASSWORD}@ebooks-postgres:5432/partner_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ebooks}:${RABBITMQ_PASSWORD}@ebooks-rabbitmq:5672
      CATALOG_SERVICE_URL: http://ebooks-catalog-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-delivery-service:
    image: *ghcr/ebooks-delivery-service:${DELIVERY_TAG:-latest}
    container_name: ebooks-delivery-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    env_file: .env
    environment:
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER:-ebooks}:${POSTGRES_PASSWORD}@ebooks-postgres:5432/delivery_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ebooks}:${RABBITMQ_PASSWORD}@ebooks-rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ebooks-net]

  ebooks-analytics-service:
    image: *ghcr/ebooks-analytics-service:${ANALYTICS_TAG:-latest}
    container_name: ebooks-analytics-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    env_file: .env
    environment:
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER:-ebooks}:${POSTGRES_PASSWORD}@ebooks-postgres:5432/analytics_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ebooks}:${RABBITMQ_PASSWORD}@ebooks-rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ebooks-net]

  # ─── FRONTEND ───────────────────────────────────────────────────────────────

  ebooks-web:
    image: *ghcr/ebooks-web:${WEB_TAG:-latest}
    container_name: ebooks-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: https://api.ebooks.co.mz
      NODE_ENV: production
    depends_on:
      - ebooks-api-gateway
    networks: [ebooks-net]

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  ebooks-net:
    driver: bridge
