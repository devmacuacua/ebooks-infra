# Default values — override per service in k8s/values/<service>.yaml

replicaCount: 1

image:
  repository: ghcr.io/change-me/ebooks-service
  tag: latest
  pullPolicy: Always

service:
  port: 3000

health:
  path: /health
  initialDelaySeconds: 20

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# Non-sensitive env vars (plain ConfigMap)
env: {}
  # KEY: value

# Sensitive env vars — referenced from the ebooks-secrets Secret
secretEnv: []
  # - name: DATABASE_URL
  #   secretKey: DATABASE_URL_SERVICE_NAME
