upstream gateway {
    server ebooks-api-gateway:8080;
}

upstream web {
    server ebooks-web:3000;
}

upstream partner {
    server ebooks-partner-service:3005;
}

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    server_name ebooks.co.mz www.ebooks.co.mz api.ebooks.co.mz;
    return 301 https://$host$request_uri;
}

# Frontend
server {
    listen 443 ssl http2;
    server_name ebooks.co.mz www.ebooks.co.mz;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' js.stripe.com; frame-src js.stripe.com; connect-src 'self' api.ebooks.co.mz;" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Ficheiros estáticos com cache
    location /_next/static/ {
        proxy_pass http://web;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API Gateway
server {
    listen 443 ssl http2;
    server_name api.ebooks.co.mz;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Rate limiting global na camada Nginx (antes do gateway)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req zone=api burst=60 nodelay;

    client_max_body_size 500M; # Para upload de ebooks

    location / {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Webhooks de pagamento — sem rate limit (Stripe/PayPal/M-Pesa)
    location ~ ^/api/commerce/payments/(webhooks|callbacks) {
        limit_req off;
        proxy_pass http://gateway;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}

# Widget embed — served directly from partner-service (open CORS, any origin)
server {
    listen 443 ssl http2;
    server_name widget.ebooks.co.mz;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Cache embed.js for 5 minutes (short so partners get updates quickly)
    location = /v1/embed.js {
        proxy_pass http://partner/partner/widget/v1/static/embed.js;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Widget API — books data
    location /v1/ {
        proxy_pass http://partner/partner/widget/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*" always;
        expires 1m;
    }
}
