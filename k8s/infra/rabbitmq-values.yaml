# Bitnami RabbitMQ — helm install ebooks-rabbitmq bitnami/rabbitmq -f rabbitmq-values.yaml -n ebooks-infra
auth:
  username: ebooks
  # password: via --set auth.password=<value>

persistence:
  enabled: true
  size: 8Gi

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
