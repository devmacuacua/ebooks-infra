image:
  repository: ghcr.io/change-me/ebooks-api-gateway
  tag: latest
service:
  port: 8080
health:
  path: /actuator/health
  initialDelaySeconds: 40
resources:
  requests:
    memory: "384Mi"
    cpu: "200m"
  limits:
    memory: "768Mi"
    cpu: "600m"
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 65
env:
  AUTH_SERVICE_URL: "http://ebooks-auth-service.ebooks.svc.cluster.local:8081"
  CATALOG_SERVICE_URL: "http://ebooks-catalog-service.ebooks.svc.cluster.local:8082"
  COMMERCE_SERVICE_URL: "http://ebooks-commerce-service.ebooks.svc.cluster.local:8083"
  READING_SERVICE_URL: "http://ebooks-reading-service.ebooks.svc.cluster.local:3001"
  NOTIFICATION_SERVICE_URL: "http://ebooks-notification-service.ebooks.svc.cluster.local:3002"
  SOCIAL_SERVICE_URL: "http://ebooks-social-service.ebooks.svc.cluster.local:3003"
  MEDIA_SERVICE_URL: "http://ebooks-media-service.ebooks.svc.cluster.local:3004"
  PARTNER_SERVICE_URL: "http://ebooks-partner-service.ebooks.svc.cluster.local:3005"
  DELIVERY_SERVICE_URL: "http://ebooks-delivery-service.ebooks.svc.cluster.local:3006"
  ANALYTICS_SERVICE_URL: "http://ebooks-analytics-service.ebooks.svc.cluster.local:3007"
  REDIS_URL: "redis://ebooks-redis-master.ebooks-infra.svc.cluster.local:6379"
secretEnv:
  - name: JWT_SECRET
    secretKey: JWT_SECRET
  - name: FRONTEND_URL
    secretKey: FRONTEND_URL
