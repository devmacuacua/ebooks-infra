image:
  repository: ghcr.io/change-me/ebooks-web
  tag: latest
service:
  port: 3000
health:
  path: /api/health
  initialDelaySeconds: 20
resources:
  requests:
    memory: "256Mi"
    cpu: "150m"
  limits:
    memory: "512Mi"
    cpu: "500m"
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60
env:
  NEXT_PUBLIC_API_URL: "https://api.ebooks.co.mz"
  NODE_ENV: "production"
secretEnv:
  - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secretKey: STRIPE_PUBLISHABLE_KEY
