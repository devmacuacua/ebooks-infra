# NUNCA commitar este ficheiro com valores reais.
# Criar o Secret manualmente no cluster:
#   kubectl apply -f secrets.yaml -n ebooks
#
# Ou usar um gestor de secrets (Sealed Secrets, External Secrets Operator, Vault)

apiVersion: v1
kind: Secret
metadata:
  name: ebooks-secrets
  namespace: ebooks
type: Opaque
stringData:
  # JWT
  JWT_SECRET: "muda_isto_chave_forte_256bits"
  JWT_REFRESH_SECRET: "muda_isto_chave_refresh_256bits"

  # Base de dados
  POSTGRES_USER: "ebooks"
  POSTGRES_PASSWORD: "muda_isto"

  # RabbitMQ
  RABBITMQ_USER: "ebooks"
  RABBITMQ_PASSWORD: "muda_isto"

  # URLs de base de dados por serviço NestJS
  DATABASE_URL_READING: "postgresql://ebooks:PASS@ebooks-postgresql.ebooks-infra.svc.cluster.local:5432/reading_db"
  DATABASE_URL_NOTIFICATION: "postgresql://ebooks:PASS@ebooks-postgresql.ebooks-infra.svc.cluster.local:5432/notification_db"
  DATABASE_URL_SOCIAL: "postgresql://ebooks:PASS@ebooks-postgresql.ebooks-infra.svc.cluster.local:5432/social_db"
  DATABASE_URL_MEDIA: "postgresql://ebooks:PASS@ebooks-postgresql.ebooks-infra.svc.cluster.local:5432/media_db"
  DATABASE_URL_PARTNER: "postgresql://ebooks:PASS@ebooks-postgresql.ebooks-infra.svc.cluster.local:5432/partner_db"
  DATABASE_URL_DELIVERY: "postgresql://ebooks:PASS@ebooks-postgresql.ebooks-infra.svc.cluster.local:5432/delivery_db"
  DATABASE_URL_ANALYTICS: "postgresql://ebooks:PASS@ebooks-postgresql.ebooks-infra.svc.cluster.local:5432/analytics_db"

  # Frontend
  FRONTEND_URL: "https://ebooks.co.mz"

  # OAuth
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  FACEBOOK_APP_ID: ""
  FACEBOOK_APP_SECRET: ""

  # Email
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""

  # Redes sociais
  TWITTER_API_KEY: ""
  TWITTER_API_SECRET: ""
  TWITTER_ACCESS_TOKEN: ""
  TWITTER_ACCESS_SECRET: ""
  FACEBOOK_PAGE_ID: ""
  FACEBOOK_PAGE_TOKEN: ""

  # M-Pesa
  MPESA_API_KEY: ""
  MPESA_PUBLIC_KEY: ""
  MPESA_SERVICE_PROVIDER_CODE: "171717"

  # E-mola
  EMOLA_API_KEY: ""
  EMOLA_MERCHANT_CODE: ""

  # Stripe
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_PUBLISHABLE_KEY: ""

  # PayPal
  PAYPAL_CLIENT_ID: ""
  PAYPAL_CLIENT_SECRET: ""

  # SMS (gateway HTTP genérico — Vodacom/Tmcel/Movitel)
  SMS_GATEWAY_URL: ""
  SMS_API_KEY: ""
  SMS_SENDER_ID: "EBooksStore"

  # MinIO
  MINIO_ACCESS_KEY: "ebooks_admin"
  MINIO_SECRET_KEY: "muda_isto"
