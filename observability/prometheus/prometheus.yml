global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'ebooks-api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ebooks-api-gateway:8080']

  - job_name: 'ebooks-auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ebooks-auth-service:8081']

  - job_name: 'ebooks-catalog-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ebooks-catalog-service:8082']

  - job_name: 'ebooks-commerce-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ebooks-commerce-service:8083']

  - job_name: 'ebooks-reading-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ebooks-reading-service:3001']

  - job_name: 'ebooks-notification-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ebooks-notification-service:3002']

  - job_name: 'ebooks-social-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ebooks-social-service:3003']

  - job_name: 'ebooks-media-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ebooks-media-service:3004']

  - job_name: 'ebooks-partner-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ebooks-partner-service:3005']
  - job_name: 'ebooks-delivery-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ebooks-delivery-service:3006']
  - job_name: 'ebooks-analytics-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ebooks-analytics-service:3007']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['ebooks-rabbitmq:15692']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
