# Bitnami PostgreSQL — helm install ebooks-postgresql bitnami/postgresql -f postgres-values.yaml -n ebooks-infra
global:
  postgresql:
    auth:
      username: ebooks
      # password: via --set global.postgresql.auth.password=<value>  ou Secret
      database: postgres

primary:
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  initdb:
    scripts:
      init.sql: |
        CREATE DATABASE auth_db;
        CREATE DATABASE catalog_db;
        CREATE DATABASE commerce_db;
        CREATE DATABASE reading_db;
        CREATE DATABASE notification_db;
        CREATE DATABASE social_db;
        CREATE DATABASE media_db;
        CREATE DATABASE partner_db;
        CREATE DATABASE delivery_db;
        CREATE DATABASE analytics_db;
