name: CD — Sync infra to VPS

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Sync configs & restart infra
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/ebooks

      - name: rsync infra configs
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='backups/' --exclude='certs/'
          path: .
          remote_path: /opt/ebooks/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Reload nginx & infra services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ebooks
            # Reload nginx without downtime
            docker compose -f docker/docker-compose.prod.yml exec -T nginx nginx -s reload 2>/dev/null || true
            echo "Infra synced at $(date)"
