version: '3.9'

# Stack de observabilidade — arrancar com:
# docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ebooks-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [ebooks-net]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ebooks-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-ebooks_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3100
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3100:3000"
    depends_on: [prometheus, loki]
    networks: [ebooks-net]

  loki:
    image: grafana/loki:3.0.0
    container_name: ebooks-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/tmp/loki
    ports:
      - "3101:3100"
    networks: [ebooks-net]

  promtail:
    image: grafana/promtail:3.0.0
    container_name: ebooks-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks: [ebooks-net]

  # Exporters para métricas de infra
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ebooks-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://ebooks:ebooks_secret@ebooks-postgres:5432/postgres?sslmode=disable
    networks: [ebooks-net]

  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: ebooks-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://ebooks-redis:6379
    networks: [ebooks-net]

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  ebooks-net:
    external: true
